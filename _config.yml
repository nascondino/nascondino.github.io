# Set theme
remote_theme: daviddarnes/garth

# File excludes
exclude:
- README.md
- Gemfile
- Gemfile.lock

# Set plugins
plugins:
- jekyll-paginate
- jekyll-remote-theme

# Site settings
baseurl: ''
title: 'Nascondino'
permalink: none
logo: "/logo.png"

# Pagination
paginate: 10
paginate_path: blog/page:num

# Collections
collections:
  posts:
    title: Nascondino
    output: true
    description: "About spyware and digital surveillance technologies"
